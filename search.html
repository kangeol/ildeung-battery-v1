<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>배터리 찾기 | 일등밧데리</title>
  <meta name="description" content="차량 정보를 순서대로 선택해 일등밧데리 배터리 추천 결과와 교체가격을 확인합니다.">
  <link rel="stylesheet" href="style.css">
</head>
<body class="customer-page search-page">
  <div class="app-shell">
    <header class="mobile-header search-header">
      <a class="back-link" href="index.html" aria-label="홈으로 이동">‹ 홈</a>
      <a class="brand-logo compact-brand-logo" href="index.html" aria-label="일등밧데리 홈">
        <span class="logo-eyebrow">NO.1 BATTERY</span>
        <span class="logo-line" aria-hidden="true"></span>
        <strong>일등밧데리</strong>
      </a>
      <a class="header-call" href="tel:1644-9141" aria-label="전화상담 1644-9141">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.2 3.5 4.5 5.1c-.8.5-1.1 1.5-.8 2.4 2 5.8 6.9 10.8 12.8 12.8.9.3 1.9 0 2.4-.8l1.6-2.7c.5-.8.3-1.8-.4-2.4l-2.5-1.9c-.6-.4-1.4-.4-2 .1l-1.2.9c-1.8-.9-3.2-2.3-4.1-4.1l.9-1.2c.5-.6.5-1.4.1-2L9.5 3.9c-.6-.7-1.6-.9-2.3-.4Z" fill="currentColor"/>
        </svg>
      </a>
    </header>

    <main class="search-main">
      <section class="page-title">
        <p class="eyebrow">Battery Finder</p>
        <h1>내 차 배터리 찾기</h1>
        <p>제조사부터 연료까지 선택하면 교체가격을 바로 확인할 수 있습니다.</p>
      </section>

      <form class="search-panel" id="batterySearchForm">
        <ol class="search-progress" aria-label="검색 진행 단계">
          <li class="is-current" data-progress-step="brand">
            <span class="step-dot">1</span>
            <strong>제조사</strong>
          </li>
          <li data-progress-step="model">
            <span class="step-dot">2</span>
            <strong>차종</strong>
          </li>
          <li data-progress-step="year">
            <span class="step-dot">3</span>
            <strong>연식</strong>
          </li>
          <li data-progress-step="fuel">
            <span class="step-dot">4</span>
            <strong>연료</strong>
          </li>
        </ol>

        <div class="step-field">
          <label for="brandSelect"><span>1</span> 제조사</label>
          <select id="brandSelect" required>
            <option value="">제조사 선택</option>
          </select>
        </div>
        <div class="step-field">
          <label for="modelSelect"><span>2</span> 차종</label>
          <select id="modelSelect" required disabled>
            <option value="">제조사를 먼저 선택</option>
          </select>
        </div>
        <div class="step-field">
          <label for="yearSelect"><span>3</span> 연식</label>
          <select id="yearSelect" required disabled>
            <option value="">차종을 먼저 선택</option>
          </select>
        </div>
        <div class="step-field">
          <label for="fuelSelect"><span>4</span> 연료</label>
          <select id="fuelSelect" required disabled>
            <option value="">연식을 먼저 선택</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn primary full search-submit" type="submit">배터리 결과 보기</button>
          <button class="btn secondary reset-search" id="resetSearchButton" type="button">초기화</button>
        </div>
        <p class="helper-text" id="searchStatus" role="status" aria-live="polite">차량 정보를 불러오는 중입니다.</p>
      </form>

      <section class="result-panel" aria-labelledby="resultTitle">
        <div class="result-heading">
          <h2 id="resultTitle">추천 결과</h2>
          <p>출장 교체 기준 예상 가격이며, 정확한 장착 여부는 상담 시 최종 확인됩니다.</p>
        </div>
        <div class="result-summary" id="resultSummary" hidden></div>
        <div class="empty-state" id="emptyState">
          <span class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32">
              <path d="M7 17h14l-2.5-6h-8L7 17Z" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
              <path d="M6 17h16a3 3 0 0 1 3 3v4H4v-4a3 3 0 0 1 2-3Z" fill="currentColor"/>
              <circle cx="9" cy="24" r="2.3" fill="#fff"/>
              <circle cx="20" cy="24" r="2.3" fill="#fff"/>
              <path d="M24 7h5M26.5 4.5v5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </span>
          <strong>차량 정보를 선택해 주세요.</strong>
          <p>선택한 차량에 맞는 배터리와 교체가격이 이곳에 표시됩니다.</p>
        </div>
        <div class="result-list" id="resultList"></div>
      </section>
    </main>

    <aside class="search-callbar" aria-label="전화상담">
      <span>
        <strong>차량 선택이 어렵다면</strong>
        <small>전문 상담으로 바로 확인</small>
      </span>
      <a class="btn primary" href="tel:1644-9141">1644-9141</a>
    </aside>
  </div>

  <script src="app.js"></script>
  <script src="search.js"></script>
</body>
</html>
